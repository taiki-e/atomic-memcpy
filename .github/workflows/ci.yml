name: CI

permissions: {}

on:
  pull_request:
  push:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  CARGO_NET_RETRY: 10
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TEST_THREADS: 1
  RUSTDOCFLAGS: -D warnings
  RUSTFLAGS: -D warnings
  RUSTUP_MAX_RETRIES: 10

defaults:
  run:
    shell: bash --noprofile --norc -CeEuxo pipefail {0}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  tidy:
    uses: taiki-e/github-actions/.github/workflows/tidy.yml@38793fbf98ce204b0993c39cb5b27ba37952e76d # main
    permissions:
      security-events: write # for github/codeql-action/*
    with:
      implicit_provenance_casts: false # we cast ptr to int to align check (is_aligned requires Rust 1.79, addr requires Rust 1.84)
  test:
    needs: tidy
    uses: taiki-e/github-actions/.github/workflows/rust-test.yml@38793fbf98ce204b0993c39cb5b27ba37952e76d # main
    with:
      target: x86_64-unknown-linux-gnu,aarch64-apple-darwin,x86_64-pc-windows-msvc,aarch64-unknown-linux-gnu,armv5te-unknown-linux-gnueabi,i686-unknown-linux-gnu,s390x-unknown-linux-gnu
      test-fat-lto: true
      miri-all-features: false

  build:
    needs: tidy
    strategy:
      fail-fast: false
      matrix:
        include:
          - rust: stable
          - rust: beta
          - rust: nightly
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: rust@${{ matrix.rust }},cargo-hack
          fallback: none
      - run: tools/build.sh
        env:
          ALL_TARGETS_MUST_BE_AVAILABLE: ${{ matrix.rust == 'nightly' || '' }}

  san:
    needs: tidy
    strategy:
      fail-fast: false
      matrix:
        sanitizer:
          - address
          - memory
          - thread
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - run: |
          printf 'TARGET=x86_64-unknown-linux-gnuasan\n' >>"${GITHUB_ENV}"
          printf 'ASAN_OPTIONS=detect_stack_use_after_return=1\n' >>"${GITHUB_ENV}"
        if: matrix.sanitizer == 'address'
      - run: |
          printf 'TARGET=x86_64-unknown-linux-gnumsan\n' >>"${GITHUB_ENV}"
          printf 'BUILD_STD=-Z''build-std\n' >>"${GITHUB_ENV}"
          printf 'MSAN_OPTIONS=verbosity=2\n' >>"${GITHUB_ENV}"
          printf 'RUSTFLAGS=%s\n' "${RUSTFLAGS} -Z sanitizer-memory-track-origins" >>"${GITHUB_ENV}"
          printf 'RUSTDOCFLAGS=%s\n' "${RUSTDOCFLAGS} -Z sanitizer-memory-track-origins" >>"${GITHUB_ENV}"
        if: matrix.sanitizer == 'memory'
      - run: |
          printf 'TARGET=x86_64-unknown-linux-gnutsan\n' >>"${GITHUB_ENV}"
        if: matrix.sanitizer == 'thread'
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: rust@nightly+${{ env.TARGET }}${{ matrix.sanitizer == 'memory' && '+rust-src' || '' }}
          fallback: none
      - run: cargo ${BUILD_STD:-} test --workspace --target "${TARGET}"
      - run: cargo ${BUILD_STD:-} test --workspace --release --target "${TARGET}"
      - run: cargo ${BUILD_STD:-} test --workspace --release --target "${TARGET}"
        env:
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
          CARGO_PROFILE_RELEASE_LTO: fat

  valgrind:
    needs: tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: rust@nightly
          fallback: none
      - uses: taiki-e/setup-cross-toolchain-action@3d9770ce98eb7dbcf378563182a5e8031165f75b # v1.41.0
        with:
          target: host-tuple
          runner: valgrind
      - run: cargo test -v --workspace
      - run: cargo test -v --workspace --release
      - run: cargo test -v --workspace --release
        env:
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: 1
          CARGO_PROFILE_RELEASE_LTO: fat

  asm-test:
    needs: tidy
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: taiki-e/checkout-action@7d1e50e93dc4fb3bba58f85018fadf77898aee8b # v1.4.2
      - uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: rust@nightly+rust-src
          fallback: none
      - run: cargo test --manifest-path tests/asm-test/Cargo.toml
